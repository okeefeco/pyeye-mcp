# .pre-commit-config.yaml
default_language_version:
  python: python3.12

# Install pre-commit, commit-msg, post-commit, post-merge, AND post-checkout
# hooks on `pre-commit install`. post-commit drives the decision-log nudge;
# post-merge/post-checkout drive the version-file refresh and metrics-session
# start below (#462). Run `pre-commit install` after pulling this change to wire
# the new hook types.
default_install_hook_types: [pre-commit, commit-msg, post-commit, post-merge, post-checkout]

# Default stage for hooks that don't declare their own `stages`. Without this,
# pre-commit runs an unscoped hook in EVERY installed stage — so widening the
# install types above (#462) made the lint/format/security/conformance hooks
# (notably the always_run `conformance-linter`, a pytest run) fire on every
# `git checkout`/`pull`/`merge` too (#477). Scoping the default to commit time
# keeps those at `git commit`; the four hooks that intentionally run on other
# stages declare their own `stages` and are unaffected.
default_stages: [pre-commit]

repos:
  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: .*\.lock

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ['-ll', '--skip', 'B101,B601']
        exclude: ^tests/

  # Dependency vulnerability scanning with pip-audit (via uv)
  - repo: local
    hooks:
      - id: pip-audit
        name: Check dependencies with pip-audit
        # Ignored vulnerabilities (tracked in GitHub issues):
        # - GHSA-4xh5-x5gv-qwph: pip vulnerability, awaiting pip 25.3
        # - CVE-2025-69872: diskcache pickle deserialization, no fix available (issue #289)
        # - CVE-2026-4539: pygments vulnerability, no fix available yet (latest is 2.19.2)
        entry: uv run --frozen pip-audit --skip-editable --ignore-vuln GHSA-4xh5-x5gv-qwph --ignore-vuln CVE-2025-69872 --ignore-vuln CVE-2026-4539
        language: system
        pass_filenames: false
        files: '(requirements.*\.txt|pyproject\.toml|uv\.lock)$'

  # Formatting / linting / type-checking run from the uv-managed venv via
  # `uv run`, so their versions come from the single pin in pyproject.toml
  # (dev group) rather than separate hook `rev:`s. This keeps pre-commit,
  # `uv run <tool>`, and CI on the exact same binary — no drift (#413).
  # Requires a synced env (`uv sync`); CI does this before running pre-commit.
  - repo: local
    hooks:
      # Code formatting
      - id: black
        name: black
        entry: uv run --frozen black
        language: system
        types: [python]
        args: ['--line-length=100']

      # Linting (Note: Ruff handles import sorting via the "I" rule;
      # ruff-format disabled since we use black for formatting)
      - id: ruff
        name: ruff
        entry: uv run --frozen ruff check
        language: system
        types: [python]
        args: ['--fix', '--exit-non-zero-on-fix']

      # Type checking — run on the whole package as a unit (pass_filenames:
      # false), NOT on the per-file list pre-commit would otherwise pass. mypy
      # is a whole-program analyser; feeding it batched file subsets makes
      # mypy 2.x INTERNAL-ERROR on a partial module graph (caught in CI on #413).
      # This invocation is identical to the CI `type-check` job. Type stubs live
      # in the pyproject dev group so `uv run mypy` picks them up.
      - id: mypy
        name: mypy
        entry: uv run --frozen mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ['src/pyeye', '--ignore-missing-imports']

  # Documentation
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: ^(tests/|setup\.py|docs/)
        args: ['--convention=google']

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-docstring-first
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: name-tests-test
        args: ['--pytest-test-first']
        # Exclude any 'fixtures/' or 'utils/' directory under tests/, at any
        # nesting depth. Fixture .py files are intentionally NOT named
        # 'test_*' — they are sample code under analysis, not pytest cases.
        exclude: '^tests/.*(fixtures|utils)/|response_linter\.py$'

  # Project-specific checks
  # Cross-platform path checker - useful for periodic audits but has false positives
  # To run manually: python scripts/check_cross_platform_paths.py src/pyeye/**/*.py
  # - repo: local
  #   hooks:
  #     - id: check-cross-platform-paths
  #       name: Check cross-platform path usage
  #       entry: python scripts/check_cross_platform_paths.py
  #       language: system
  #       files: '\.py$'
  #       exclude: '^(tests/fixtures/|scripts/check_cross_platform_paths\.py)'

  # JSON validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
      - id: pretty-format-json
        args: ['--autofix', '--indent=2']
        exclude: .*\.lock

  # Commit message
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Conformance linter — layering + absence-vs-zero invariant
  # Runs the adversarial + existing-response tests to catch content-layer
  # violations and incorrect edge_counts semantics before each commit.
  # Intentionally fast: only tests/conformance/ is executed (< 5 seconds).
  - repo: local
    hooks:
      - id: conformance-linter
        name: PyEye conformance linter (layering + absence-vs-zero)
        entry: uv run --frozen pytest tests/conformance/ -q --no-header --no-cov
        language: system
        pass_filenames: false
        always_run: true

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix']

  # Decision-log nudge — runs AFTER each commit, never blocks. Prints a one-line
  # suggestion when the just-committed diff touches a contract surface (new
  # PYEYE_* config knob, public/dunder signature change, or an output-shape dict
  # key in a report/schema/export function). Suggestion only — the decision to
  # log stays human. verbose:true so the nudge is shown despite the 0 exit code.
  - repo: local
    hooks:
      - id: decision-log-nudge
        name: Decision-log nudge (contract-surface suggestion)
        entry: python scripts/decision_log_nudge.py
        language: system
        stages: [post-commit]
        pass_filenames: false
        always_run: true
        verbose: true

  # Refresh the setuptools_scm version file after the working tree's git state
  # changes (#462). _version.py is gitignored and only written at install time,
  # so the self-reported version (pyeye://about) drifts after a pull/merge or
  # branch switch otherwise. `uv run` because setuptools_scm lives in the venv.
  # Failure-tolerant (the script always exits 0) so it never blocks git.
  - repo: local
    hooks:
      - id: refresh-version-file
        name: Refresh setuptools_scm version file
        entry: uv run --frozen python scripts/refresh_version.py
        language: system
        stages: [post-merge, post-checkout]
        pass_filenames: false
        always_run: true

  # Start a dogfooding metrics session when checking out an issue branch (#462).
  # Pre-commit-managed (was a local-only .git/hooks/post-checkout) so every
  # contributor gets it. `uv run` because dogfooding_metrics.py imports click +
  # pyeye. The command self-guards file checkouts and is failure-tolerant.
  - repo: local
    hooks:
      - id: start-metrics-session
        name: Start dogfooding metrics session
        entry: uv run --frozen python scripts/dogfooding_metrics.py start-on-checkout
        language: system
        stages: [post-checkout]
        pass_filenames: false
        always_run: true
        verbose: true
