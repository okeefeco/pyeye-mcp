# CI Workflow - Optimized for GitHub Actions minute consumption
#
# Cost optimization strategy (Issue #65):
# - PRs: Skip middle Python version on Linux/Windows, macOS runs middle version only
#   - Linux: 3.10, 3.12 (saves 1 job)
#   - Windows: 3.10, 3.12 (saves 1 job)
#   - macOS: 3.11 only (saves 2 jobs = 20x minutes!)
# - Main: Run full matrix (9 jobs across 3 OS × 3 Python versions)
# - Estimated savings: 40-50% reduction in monthly minute usage
#
# Platform minute multipliers:
# - Linux: 1x (1 minute = 1 minute billed)
# - Windows: 2x (1 minute = 2 minutes billed)
# - macOS: 10x (1 minute = 10 minutes billed)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: pre-commit/action@v3.0.0

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Always run - Linux and Windows endpoints, macOS middle
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.11'

          # Only on main branch - Linux and Windows middle versions
          - os: ubuntu-latest
            python-version: '3.11'
            main-only: true
          - os: windows-latest
            python-version: '3.11'
            main-only: true

          # Only on main branch - macOS endpoints
          - os: macos-latest
            python-version: '3.10'
            main-only: true
          - os: macos-latest
            python-version: '3.12'
            main-only: true

    # Skip jobs marked as main-only when not on main branch
    if: ${{ !matrix.main-only || github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/pycodemcp --cov-report=xml --cov-report=term --cov-fail-under=75

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run mypy
        run: |
          mypy src/pycodemcp --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run bandit
        run: |
          bandit -r src/ -ll

      # Safety check removed - deprecated command with compatibility issues
      # Consider using pip-audit or other alternatives in future
