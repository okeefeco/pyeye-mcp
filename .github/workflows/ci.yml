# CI Workflow - Optimized for GitHub Actions minute consumption
#
# Cost optimization strategy (Issue #65):
# - PRs: Skip middle Python version on Linux/Windows, macOS runs middle version only
#   - Linux: 3.10, 3.12 (saves 1 job)
#   - Windows: 3.10, 3.12 (saves 1 job)
#   - macOS: 3.11 only (saves 2 jobs = 20x minutes!)
# - Main: Run full matrix (9 jobs across 3 OS × 3 Python versions)
# - Estimated savings: 40-50% reduction in monthly minute usage
#
# Platform minute multipliers:
# - Linux: 1x (1 minute = 1 minute billed)
# - Windows: 2x (1 minute = 2 minutes billed)
# - macOS: 10x (1 minute = 10 minutes billed)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - uses: pre-commit/action@v3.0.1

  # Detect if only documentation files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            docs:
              - '**.md'
              - 'docs/**'
              - '.github/*.md'
              - 'LICENSE'
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '.github/workflows/**'
              - 'setup.py'
              - 'setup.cfg'
      # For non-PR events, always run code checks
      - name: Set outputs for non-PR events
        if: github.event_name != 'pull_request'
        id: non-pr
        run: |
          echo "code=true" >> $GITHUB_OUTPUT
          echo "docs=false" >> $GITHUB_OUTPUT

  test-pr:
    # Runs on PRs - optimized matrix to save minutes
    # Skip if only documentation files changed
    needs: [changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15  # Prevent runaway tests
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - endpoints only
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.12'
          # Windows - endpoints only
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.12'
          # macOS - middle only (biggest savings)
          - os: macos-latest
            python-version: '3.11'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/pyeye --cov-report=xml --cov-report=term --cov-fail-under=85

      - name: Upload coverage to Codecov
        # Skip for Dependabot PRs as they don't have access to secrets
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-main:
    # Runs on main branch - full matrix for comprehensive testing
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15  # Prevent runaway tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/pyeye --cov-report=xml --cov-report=term --cov-fail-under=85

      - name: Upload coverage to Codecov
        # Skip for Dependabot PRs as they don't have access to secrets
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  type-check:
    # Skip type checking for documentation-only changes in PRs
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          # Install setuptools_scm for version file generation
          uv pip install --system setuptools_scm

      - name: Generate version file
        run: |
          # Generate _version.py using setuptools_scm
          cat > generate_version.py << 'EOF'
          from setuptools_scm import get_version
          import pathlib
          import re

          version = get_version()

          # Parse version to match setuptools_scm native format
          # Release versions (e.g., '0.3.0'): 3-tuple
          # Dev versions (e.g., '0.3.1.dev1+gc7c622c'): 5-tuple
          parts = re.match(r'(\d+)\.(\d+)\.(\d+)(\.(.+))?', version)
          if parts:
              major, minor, patch = int(parts[1]), int(parts[2]), int(parts[3])
              rest = parts[5] if parts[5] else ''
              if rest:
                  # Dev/pre-release version - use 5-tuple format
                  if '+' in rest:
                      pre, local = rest.split('+', 1)
                      version_tuple = (major, minor, patch, pre, local)
                  else:
                      version_tuple = (major, minor, patch, rest, '')
              else:
                  # Clean release - use 3-tuple format
                  version_tuple = (major, minor, patch)
          else:
              # Fallback - use 3-tuple
              version_tuple = (0, 0, 0)

          # Generate the _version.py file
          version_file = pathlib.Path('src/pyeye/_version.py')
          version_file.write_text(f'''"""Auto-generated version file."""
          __version__ = "{version}"
          __version_tuple__ = {version_tuple}
          ''')
          print(f'Generated _version.py with version {version}')
          EOF
          python generate_version.py

      - name: Run mypy
        run: |
          mypy src/pyeye --ignore-missing-imports

  changelog-validation:
    # Validate changelog format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Validate changelog
        run: |
          python scripts/validate_changelog.py

  security:
    # Always run security checks, even for docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run bandit
        run: |
          bandit -r src/ -ll

      # Safety check removed - deprecated command with compatibility issues
      # Consider using pip-audit or other alternatives in future

  # Dummy success jobs for docs-only PRs to satisfy branch protection
  # These jobs report success when tests are skipped for documentation changes
  test-pr-dummy:
    name: test-pr (${{ matrix.os }}, ${{ matrix.python-version }})
    needs: [changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.11'
    steps:
      - name: Skip tests for docs-only changes
        run: echo "Skipping tests - documentation only changes detected"

  type-check-dummy:
    name: type-check
    needs: [changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip type checking for docs-only changes
        run: echo "Skipping type checking - documentation only changes detected"
