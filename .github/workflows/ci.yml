# CI Workflow - Optimized for GitHub Actions minute consumption
#
# Cost optimization strategy (Issue #65):
# - PRs: Skip middle Python version on Linux/Windows, macOS runs middle version only
#   - Linux: 3.10, 3.12 (saves 1 job)
#   - Windows: 3.10, 3.12 (saves 1 job)
#   - macOS: 3.11 only (saves 2 jobs = 20x minutes!)
# - Main: Run full matrix (9 jobs across 3 OS × 3 Python versions)
# - Estimated savings: 40-50% reduction in monthly minute usage
#
# Platform minute multipliers:
# - Linux: 1x (1 minute = 1 minute billed)
# - Windows: 2x (1 minute = 2 minutes billed)
# - macOS: 10x (1 minute = 10 minutes billed)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: pre-commit/action@v3.0.0

  # Detect if only documentation files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            docs:
              - '**.md'
              - 'docs/**'
              - '.github/*.md'
              - 'LICENSE'
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '.github/workflows/**'
              - 'setup.py'
              - 'setup.cfg'
      # For non-PR events, always run code checks
      - name: Set outputs for non-PR events
        if: github.event_name != 'pull_request'
        id: non-pr
        run: |
          echo "code=true" >> $GITHUB_OUTPUT
          echo "docs=false" >> $GITHUB_OUTPUT

  test-pr:
    # Runs on PRs - optimized matrix to save minutes
    # Skip if only documentation files changed
    needs: [changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - endpoints only
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.12'
          # Windows - endpoints only
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.12'
          # macOS - middle only (biggest savings)
          - os: macos-latest
            python-version: '3.11'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/pycodemcp --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-main:
    # Runs on main branch - full matrix for comprehensive testing
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/pycodemcp --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  type-check:
    # Skip type checking for documentation-only changes in PRs
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run mypy
        run: |
          mypy src/pycodemcp --ignore-missing-imports

  security:
    # Always run security checks, even for docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run bandit
        run: |
          bandit -r src/ -ll

      # Safety check removed - deprecated command with compatibility issues
      # Consider using pip-audit or other alternatives in future
