# CI Workflow - Optimized for GitHub Actions minute consumption
#
# Cost optimization strategy (Issue #65):
# - PRs: Run only Ubuntu + Python 3.11 (saves ~95% of minutes)
# - Main: Run full matrix (9 jobs across 3 OS × 3 Python versions)
# - Estimated savings: 70-80% reduction in monthly minute usage
#
# Platform minute multipliers:
# - Linux: 1x (1 minute = 1 minute billed)
# - Windows: 2x (1 minute = 2 minutes billed)
# - macOS: 10x (1 minute = 10 minutes billed)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: pre-commit/action@v3.0.0

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full matrix on main branch, minimal on PRs to save minutes
        # macOS uses 10x minutes, Windows uses 2x minutes
        os: ${{ github.ref == 'refs/heads/main' && fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        python-version: ${{ github.ref == 'refs/heads/main' && fromJSON('["3.10", "3.11", "3.12"]') || fromJSON('["3.11"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src/pycodemcp --cov-report=xml --cov-report=term --cov-fail-under=75

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run mypy
        run: |
          mypy src/pycodemcp --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run bandit
        run: |
          bandit -r src/ -ll

      # Safety check removed - deprecated command with compatibility issues
      # Consider using pip-audit or other alternatives in future
