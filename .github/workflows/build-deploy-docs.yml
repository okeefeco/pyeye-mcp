name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths: [ 'docs/**', 'src/**/*.py' ]  # Only run when docs or code changes

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Full history for version info

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: '**/pyproject.toml'

    - name: Install dependencies
      run: uv sync --group docs  # installs the package + docs deps (sphinx, …)

    - name: Build documentation
      run: |
        cd docs
        uv run sphinx-build -b html source build/html

    - name: Upload documentation artifacts (for PR previews)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: documentation-preview
        path: docs/build/html/
        retention-days: 7

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/build/html
        # Keep history for better git management
        force_orphan: false
        # Add custom domain if you have one (optional)
        # cname: docs.yourdomain.com
