# Development Version Auto-Increment Workflow
# Automatically increments the development version number on main branch commits
#
# REQUIRED SETUP:
# 1. Create a Personal Access Token (PAT) with 'repo' scope
# 2. Add it as a repository secret named ADMIN_PAT
# 3. The PAT must have admin permissions to bypass branch protection
#
# Without ADMIN_PAT, this workflow will fail on protected branches

name: Dev Version Increment

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Needed to commit and push version changes

jobs:
  increment-dev-version:
    name: Auto-increment Development Version
    runs-on: ubuntu-latest

    # Skip if this is already a version bump commit or release commit
    if: |
      !contains(github.event.head_commit.message, 'bump:') &&
      !contains(github.event.head_commit.message, 'Bump version') &&
      !contains(github.event.head_commit.message, 'chore: bump') &&
      !contains(github.event.head_commit.message, '[skip-version]') &&
      !contains(github.event.head_commit.message, 'Release') &&
      github.event.head_commit.author.name != 'github-actions[bot]'

    steps:
      - name: Check for PAT configuration
        run: |
          if [ -z "${{ secrets.ADMIN_PAT }}" ]; then
            echo "⚠️ Warning: ADMIN_PAT secret not configured."
            echo "The workflow may fail to push to protected branch without it."
            echo "Please create a PAT with 'repo' scope and add it as ADMIN_PAT secret."
          else
            echo "✅ ADMIN_PAT is configured"
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Use PAT with admin permissions to bypass branch protection
          # Fallback to GITHUB_TOKEN if PAT not configured
          token: ${{ secrets.ADMIN_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv and dependencies
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Get current version info
        id: version-info
        run: |
          # Get current version from package
          CURRENT_VERSION=$(python -c "from pycodemcp import __version__; print(__version__)")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Check if it's a dev version
          if [[ "$CURRENT_VERSION" == *.dev* ]]; then
            echo "is_dev_version=true" >> $GITHUB_OUTPUT
            # Extract base version and dev number
            BASE_VERSION=$(echo "$CURRENT_VERSION" | sed 's/\.dev[0-9]*//')
            DEV_NUM=$(echo "$CURRENT_VERSION" | sed -n 's/.*\.dev\([0-9]*\)/\1/p')
            echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
            echo "dev_number=$DEV_NUM" >> $GITHUB_OUTPUT
          else
            echo "is_dev_version=false" >> $GITHUB_OUTPUT
          fi

          echo "Current version: $CURRENT_VERSION"

      - name: Calculate next dev version
        id: next-version
        if: steps.version-info.outputs.is_dev_version == 'true'
        run: |
          BASE_VERSION="${{ steps.version-info.outputs.base_version }}"
          CURRENT_DEV_NUM="${{ steps.version-info.outputs.dev_number }}"

          # Increment dev number
          NEXT_DEV_NUM=$((CURRENT_DEV_NUM + 1))
          NEXT_VERSION="${BASE_VERSION}.dev${NEXT_DEV_NUM}"

          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Update version files
        if: steps.version-info.outputs.is_dev_version == 'true'
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.next_version }}"

          # Update pyproject.toml project version
          sed -i "s/version = \".*\"/version = \"$NEXT_VERSION\"/" pyproject.toml

          # Update pyproject.toml commitizen version
          sed -i "/\[tool.commitizen\]/,/^\[/{s/version = \".*\"/version = \"$NEXT_VERSION\"/;}" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEXT_VERSION\"/" src/pycodemcp/__init__.py

          echo "Updated version to: $NEXT_VERSION"

      - name: Verify version consistency
        if: steps.version-info.outputs.is_dev_version == 'true'
        run: |
          # Run our version consistency tests (skip coverage for dev version bumps)
          uv run pytest tests/test_version_consistency.py -v --no-cov
          echo "✅ Version consistency verified"

      - name: Commit version increment
        if: steps.version-info.outputs.is_dev_version == 'true'
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.next_version }}"

          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"

          # Add and commit changes
          git add pyproject.toml src/pycodemcp/__init__.py
          git commit -m "chore: bump dev version to $NEXT_VERSION [skip-version]

          Auto-increment development version after main branch commit.

          - pyproject.toml: ${{ steps.version-info.outputs.current_version }} → $NEXT_VERSION
          - src/pycodemcp/__init__.py: ${{ steps.version-info.outputs.current_version }} → $NEXT_VERSION

          🤖 Generated by dev-version workflow"

          # Push changes (requires ADMIN_PAT for protected branches)
          if git push; then
            echo "✅ Successfully pushed version increment to $NEXT_VERSION"
          else
            echo "❌ Failed to push to protected branch"
            echo "Make sure ADMIN_PAT secret is configured with a Personal Access Token"
            echo "that has 'repo' scope and admin permissions on this repository."
            exit 1
          fi

      - name: Handle non-dev version
        if: steps.version-info.outputs.is_dev_version == 'false'
        run: |
          CURRENT_VERSION="${{ steps.version-info.outputs.current_version }}"
          echo "⚠️ Current version ($CURRENT_VERSION) is not a dev version."
          echo "This usually happens after a release. The next release workflow"
          echo "should set up the next dev version automatically."
          echo "If this is unexpected, manually set version to X.Y.Z.dev0 format."

      - name: Summary
        if: always()
        run: |
          echo "=== Dev Version Workflow Summary ==="
          echo "Triggered by: ${{ github.event.head_commit.message }}"
          echo "Current version: ${{ steps.version-info.outputs.current_version }}"
          if [[ "${{ steps.version-info.outputs.is_dev_version }}" == "true" ]]; then
            echo "Next version: ${{ steps.next-version.outputs.next_version }}"
            echo "✅ Development version auto-incremented"
          else
            echo "ℹ️ No version increment (not a dev version)"
          fi
