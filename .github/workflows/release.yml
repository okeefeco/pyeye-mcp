# Release Workflow
# Automated release process triggered by version tags

name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.1, etc.
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write  # Needed to create releases
  id-token: write  # Needed for Trusted Publisher (PyPI OIDC)

jobs:
  # Validate the release before creating it
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for changelog generation

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          # Install setuptools_scm first for version generation
          uv pip install --system setuptools_scm
          # Generate version file from git tag
          python -m setuptools_scm
          # Then install the package with dependencies
          uv pip install --system -e ".[dev]"

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG_VERSION"

      - name: Verify tag matches package version
        run: |
          # With setuptools_scm, version is derived from git tag
          PACKAGE_VERSION=$(python -c "from pyeye import __version__; print(__version__)")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          echo "Package version: $PACKAGE_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package=$PACKAGE_VERSION, tag=$TAG_VERSION"
            echo "Please ensure the tag matches the package version"
            exit 1
          fi
          echo "✅ Version verification passed"

      - name: Run comprehensive tests
        run: |
          # Run the full test suite with coverage
          pytest --cov=src/pyeye --cov-report=xml --cov-report=term --cov-fail-under=85
          echo "✅ All tests passed"

      - name: Run type checking
        run: |
          mypy src/pyeye --ignore-missing-imports
          echo "✅ Type checking passed"

      - name: Run security checks
        run: |
          bandit -r src/ -ll
          echo "✅ Security checks passed"

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1

  # Create the GitHub release
  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest

    outputs:
      release-url: ${{ steps.create-release.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch full history for changelog

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          # Install setuptools_scm first for version generation
          uv pip install --system setuptools_scm
          # Generate version file from git tag
          python -m setuptools_scm
          # Then install the package with dependencies
          uv pip install --system -e ".[dev]"

      - name: Extract version info
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Build package
        run: |
          # Build the Python package
          uv build

          # List built artifacts
          echo "Built packages:"
          ls -la dist/

      - name: Create GitHub Release
        id: create-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Determine if this is a prerelease
          PRERELEASE_FLAG=""
          case "${{ steps.version.outputs.version }}" in
            *a*|*b*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          # Create release with auto-generated notes and attach assets
          RELEASE_URL=$(gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            dist/pyeye_mcp-${{ steps.version.outputs.version }}-py3-none-any.whl \
            dist/pyeye_mcp-${{ steps.version.outputs.version }}.tar.gz)

          echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "Created release: $RELEASE_URL"

      - name: Upload dist artifacts for PyPI publishing
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Publish to TestPyPI first (dry run)
  publish-testpypi:
    name: Publish to TestPyPI
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyeye-mcp/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        # No token needed - uses Trusted Publisher (OIDC)

  # Publish to PyPI using Trusted Publisher (OIDC)
  publish-pypi:
    name: Publish to PyPI
    needs: [release, publish-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyeye-mcp/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed - uses Trusted Publisher (OIDC)

  # Notify about the release
  notify:
    name: Notify Release Created
    needs: [validate, release, publish-testpypi, publish-pypi]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Release Success Notification
        if: needs.release.result == 'success' && needs.publish-testpypi.result == 'success' && needs.publish-pypi.result == 'success'
        run: |
          echo "🎉 Release successful!"
          echo "📦 GitHub Release: ${{ needs.release.outputs.release-url }}"
          echo "🧪 TestPyPI: https://test.pypi.org/project/pyeye-mcp/"
          echo "🐍 PyPI: https://pypi.org/project/pyeye-mcp/"
          echo ""
          echo "Installation:"
          echo "  pip install pyeye-mcp"

      - name: Release Failure Notification
        if: needs.validate.result == 'failure' || needs.release.result == 'failure' || needs.publish-testpypi.result == 'failure' || needs.publish-pypi.result == 'failure'
        run: |
          echo "❌ Release failed!"
          echo "Check the logs above for detailed error information."
          echo ""
          echo "Job results:"
          echo "- Validation: ${{ needs.validate.result }}"
          echo "- GitHub Release: ${{ needs.release.result }}"
          echo "- TestPyPI Publish: ${{ needs.publish-testpypi.result }}"
          echo "- PyPI Publish: ${{ needs.publish-pypi.result }}"
          echo ""
          echo "Common issues:"
          echo "- Version mismatch between tag and package"
          echo "- Test failures or coverage below threshold"
          echo "- Type checking or security check failures"
          echo "- Pre-commit hook failures"
          echo "- Trusted Publisher not configured (both TestPyPI and PyPI need separate setup)"
          exit 1
